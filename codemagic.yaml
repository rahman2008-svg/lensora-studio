workflows:
  android-build:
    name: Lensora Studio Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      java: 17

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper

    scripts:
      - name: Grant permissions
        script: |
          chmod +x gradlew

      - name: Setup Gradle
        script: |
          ./gradlew --version

      - name: Clean project
        script: |
          ./gradlew clean

      - name: Build Debug APK
        script: |
          ./gradlew assembleDebug

      - name: Build Release APK
        script: |
          ./gradlew assembleRelease

    artifacts:
      - app/build/outputs/**/*.apk
      - app/build/outputs/**/*.aab

    publishing:
      email:
        recipients:
          - prince.ar.abdur.rahman2008@gmail.com
